<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-stone-50 dark:bg-neutral-950 border-b border-stone-200/60 dark:border-neutral-800 docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 h-16">
<button class="text-stone-400 dark:text-neutral-500 hover:opacity-70 transition-opacity active:scale-98 transition-transform duration-200">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-serif italic font-medium text-2xl text-stone-900 dark:text-stone-50">StyleAI</h1>
<button class="text-stone-400 dark:text-neutral-500 hover:opacity-70 transition-opacity active:scale-98 transition-transform duration-200">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col p-container-margin pt-stack-md pb-32">
<!-- AI Scan Canvas -->
<section class="relative mb-stack-lg">
<div class="aspect-[3/4] w-full rounded-xl overflow-hidden bg-surface-container shadow-[0_10px_30px_rgba(0,0,0,0.04)]">
<img alt="Beige Trench Coat" class="w-full h-full object-cover" data-alt="A high-end studio photograph of a classic beige double-breasted trench coat draped elegantly against a neutral cream background. The lighting is soft and directional, highlighting the fine texture of the cotton gabardine fabric and the subtle shadows in its folds. The composition is clean and minimalist, reflecting a luxury fashion editorial aesthetic with a warm, sophisticated color palette. The coat is the sole focus, presented in a crisp, light-mode environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-i2M0Gsp-wC64Vv2Y1x-zd7YLDo71tDdPbtlmHMTCXlwfOTOZbRm-RlA2qFPGVuptYpKkr7sD-Ts7uBVDVLT0kRgO5Vte9JqjwOWI05uotFusin7sQ2SpKhWjC3nSq2uPjOcO5rqdKGFH_0qpyI46ZzReV6s-geh3oB4NVqXAYUcPMkG-R2xEvo4e9dWIekp2tW85Q0WkomDYlMJyrUkALRKcmHVOwXNC-lcIdjU0d7oEeTVUJWxQqqz6NIeRwcXijZnO_CFmL2sj"/>
</div>
<!-- AI Pulse Indicator -->
<div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full flex items-center gap-2 border border-stone-100 shadow-sm">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-amber-600"></span>
</span>
<span class="font-label-md text-label-md text-primary uppercase">AI Analysis Active</span>
</div>
</section>
<!-- Detection Results -->
<section class="space-y-stack-md">
<div class="flex items-center justify-between mb-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">AI Detected</h2>
<span class="font-label-md text-label-md text-secondary uppercase tracking-widest">4 Attributes</span>
</div>
<!-- Bento-style Attributes Grid -->
<div class="grid grid-cols-2 gap-gutter">
<!-- Type -->
<div class="bg-surface-container-low p-stack-md rounded-xl border border-stone-200/40 flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="font-label-md text-label-md text-secondary uppercase tracking-tighter">Type</span>
<button class="hover:opacity-70 transition-opacity"><span class="material-symbols-outlined text-sm text-outline" data-icon="edit">edit</span></button>
</div>
<p class="font-headline-md text-headline-md text-on-surface">Outerwear</p>
</div>
<!-- Season -->
<div class="bg-surface-container-low p-stack-md rounded-xl border border-stone-200/40 flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="font-label-md text-label-md text-secondary uppercase tracking-tighter">Season</span>
<button class="hover:opacity-70 transition-opacity"><span class="material-symbols-outlined text-sm text-outline" data-icon="edit">edit</span></button>
</div>
<div>
<p class="font-headline-md text-headline-md text-on-surface">Spring</p>
<p class="font-headline-md text-headline-md text-on-surface">Autumn</p>
</div>
</div>
<!-- Occasion -->
<div class="bg-surface-container-low p-stack-md rounded-xl border border-stone-200/40 flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="font-label-md text-label-md text-secondary uppercase tracking-tighter">Occasion</span>
<button class="hover:opacity-70 transition-opacity"><span class="material-symbols-outlined text-sm text-outline" data-icon="edit">edit</span></button>
</div>
<div>
<p class="font-headline-md text-headline-md text-on-surface">Formal</p>
<p class="font-headline-md text-headline-md text-on-surface">Casual</p>
</div>
</div>
<!-- Color -->
<div class="bg-surface-container-low p-stack-md rounded-xl border border-stone-200/40 flex flex-col justify-between h-32">
<div class="flex justify-between items-start">
<span class="font-label-md text-label-md text-secondary uppercase tracking-tighter">Color</span>
<button class="hover:opacity-70 transition-opacity"><span class="material-symbols-outlined text-sm text-outline" data-icon="edit">edit</span></button>
</div>
<div class="flex items-center gap-3">
<div class="w-6 h-6 rounded-full bg-[#E3D5C1] border border-stone-300"></div>
<p class="font-headline-md text-headline-md text-on-surface">Beige</p>
</div>
</div>
</div>
<!-- Optional Brand Detection -->
<div class="pt-stack-lg">
<div class="border-t border-stone-200 pt-stack-md">
<div class="flex items-center gap-stack-sm text-secondary">
<span class="material-symbols-outlined" data-icon="auto_fix">auto_fix</span>
<p class="font-body-sm text-body-sm italic">Suggested matching items: White Turtleneck, Dark Wash Denim</p>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Actions Container -->
<div class="fixed bottom-20 left-0 w-full px-container-margin pb-stack-md bg-gradient-to-t from-background via-background/90 to-transparent pt-10">
<button class="w-full h-14 bg-primary text-on-primary rounded-lg font-label-lg text-label-lg uppercase tracking-widest shadow-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
            Save to Closet
        </button>
</div>
<!-- Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full h-20 px-8 flex justify-around items-center bg-white/80 dark:bg-neutral-900/80 backdrop-blur-md border-t border-stone-200 dark:border-neutral-800 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] z-50 pb-safe">
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-neutral-500 hover:text-stone-900 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="checkroom">checkroom</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Closet</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-neutral-500 hover:text-stone-900 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Generate</span>
</a>
<a class="flex flex-col items-center justify-center text-amber-600 dark:text-amber-500 font-bold active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-neutral-500 hover:text-stone-900 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
